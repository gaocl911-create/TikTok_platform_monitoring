services:
  mysql:
    image: mysql:8.4
    container_name: creator-monitoring-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-creator_monitoring}
      MYSQL_USER: ${MYSQL_USER:-monitoring}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-monitoring_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_EXPOSE_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: creator-monitoring-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXPOSE_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
